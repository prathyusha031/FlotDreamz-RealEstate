{% load static %}
{% block main %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Flot Dreamz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        .cart-container {
            width: 80%;
            margin: 50px auto;
            background: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
        }
        h2 {
            text-align: center;
        }
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
        }
        .cart-item img {
            width: 100px;
            height: auto;
            border-radius: 5px;
        }
        .item-info {
            flex-grow: 1;
            margin-left: 20px;
        }
        .item-price {
            font-weight: bold;
            color: #333;
        }
        .remove-btn {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        .cart-summary {
            text-align: right;
            margin-top: 20px;
        }
        .checkout-btn {
            background-color: green;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="cart-container">
        <h2><i class="fas fa-shopping-cart"></i> Your Cart</h2>
        
        <div class="cart-item">
            <img src="property1.jpg" alt="Property Image">
            <div class="item-info">
                <p>Luxury Villa in LA</p>
                <p class="item-price">$500,000</p>
            </div>
            <button class="remove-btn">Remove</button>
        </div>
        
        <div class="cart-item">
            <img src="property2.jpg" alt="Property Image">
            <div class="item-info">
                <p>Beachfront Condo</p>
                <p class="item-price">$750,000</p>
            </div>
            <button class="remove-btn">Remove</button>
        </div>
        
        <div class="cart-summary">
            <p>Total: <strong>$1,250,000</strong></p>
            <a href="/checkout" class="checkout-btn">Proceed to Checkout</a>
        </div>
    </div>
</body>
</html>
{% endblock main %}
