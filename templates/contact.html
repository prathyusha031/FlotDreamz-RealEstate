<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Flot Dreamz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f9f9f9;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            background: white;
            padding: 30px;
            box-shadow: 0 0 10px hsla(120, 9.10%, 2.20%, 0.89);
            border-radius: 8px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color:hsla(120, 9.10%, 2.20%, 0.89);;
        }

        .contact-info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .contact-info div {
            flex: 1;
            padding: 20px;
            text-align: center;
        }

        .contact-info i {
            font-size: 30px;
            color:hsla(120, 9.10%, 2.20%, 0.89);;
            margin-bottom: 10px;
        }

        .contact-form {
            margin-top: 30px;
            padding: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        form input, form textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            border: none;
            background:hsl(182, 58.20%, 31.00%);
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background:hsla(120, 9.10%, 2.20%, 0.89);;
        }

        .social-media {
            text-align: center;
            margin-top: 20px;
        }

        .social-media a {
            margin: 0 10px;
            font-size: 24px;
            color:hsla(120, 9.10%, 2.20%, 0.89);;
        }

        @media (max-width: 768px) {
            .contact-info {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Contact Us</h2>
        <p style="text-align: center;">Have questions? We're here to help! Get in touch with Flot Dreamz.</p>

        <div class="contact-info">
            <div>
                <i class="fas fa-map-marker-alt"></i>
                <h3>Our Location</h3>
                <p>8th Floor, SLN Terminus Building, Gachibowli, Hyderabad-500032</p>
            </div>
            <div>
                <i class="fas fa-phone"></i>
                <h3>Call Us</h3>
                <p>+123 456 7890</p>
            </div>
            <div>
                <i class="fas fa-envelope"></i>
                <h3>Email Us</h3>
                <p>support@flotdreamz.com</p>
            </div>
        </div>

        <div class="contact-form">
            <h3>Send Us a Message</h3>
            <form>
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <input type="text" name="subject" placeholder="Subject" required>
                <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>

        <div class="social-media">
            <h3>Follow Us</h3>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
        </div>
    </div>

</body>
</html>
