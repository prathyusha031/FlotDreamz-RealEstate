{% extends "home.html" %}
{% load static %}

{% block content %}

<style>
    .login-wrapper {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f8f9fa;
        padding: 20px;
    }

    .login-card {
        width: 100%;
        max-width: 450px;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .login-card h2 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 600;
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        font-weight: 600;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">

```
    <h2>Login to Your Account</h2>

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">
                Email
            </label>
            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required
            >
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">
                Password
            </label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required
            >
        </div>

        <!-- Remember Me -->
        <div class="form-check mb-3">
            <input
                class="form-check-input"
                type="checkbox"
                id="rememberMe"
            >
            <label class="form-check-label" for="rememberMe">
                Remember Me
            </label>
        </div>

        <button type="submit" class="btn btn-primary btn-login">
            Login
        </button>

    </form>

    <div class="text-center mt-3">
        <p>
            Don't have an account?
            <a href="{% url 'signup' %}">
                Sign Up
            </a>
        </p>
    </div>

</div>
```

</div>

{% endblock %}
