<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login with OTP - FlotDreamz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
  <style>
    body { background-color: #f8f9fa; }
    .otp-container { 
      max-width: 400px; 
      margin: 80px auto; 
      padding: 30px; 
      background: #fff; 
      border-radius: 10px; 
      box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
    }
    .form-control { margin-bottom: 15px; }
    .resend-otp { margin-top: 10px; cursor: pointer; color: #007bff; }
    .resend-otp:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="otp-container">
    <h2 class="text-center mb-4">Login with OTP</h2>
    <form>
      <div class="form-group">
        <select id="loginMethod" class="form-control" required>
          <option value="phone">Use Mobile Number</option>
          <option value="email">Use Email</option>
        </select>
      </div>

      <div class="form-group">
        <input type="text" id="identifier" class="form-control" placeholder="Enter Mobile Number or Email" required>
      </div>
      
      <button type="button" class="btn btn-primary w-100" id="sendOtpBtn">Send OTP</button>

      <div class="form-group mt-3">
        <input type="text" id="otp" class="form-control" placeholder="Enter OTP" required>
      </div>

      <button type="submit" class="btn btn-success w-100">Verify & Login</button>
    </form>

    <p class="text-center resend-otp" id="resendOtp">Resend OTP</p>

    <p class="text-center mt-3"><a href="/login">Back to Login</a></p>
  </div>

  <script>
    document.getElementById("resendOtp").addEventListener("click", function() {
      alert("OTP resent successfully!");
    });

    document.getElementById("sendOtpBtn").addEventListener("click", function() {
      let method = document.getElementById("loginMethod").value;
      let identifier = document.getElementById("identifier").value;

      if (!identifier) {
        alert("Please enter your " + (method === "phone" ? "mobile number" : "email"));
        return;
      }

      alert("OTP sent to your " + (method === "phone" ? "mobile number" : "email") + "!");
    });
  </script>
</body>
</html>
