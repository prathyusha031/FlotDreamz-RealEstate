<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flot Dreamz - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f9f9f9;
        }

        /* Header Section */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: hsla(120, 9.10%, 2.20%, 0.89);
            color: white;
            padding: 16px 0px;
            flex-wrap: wrap;
        }

        .logo-container a {
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
        }

        .logo img {
            width: 40px;
            height: auto;
            margin-right: 10px;
        }

        .logo-text {
            font-size: 30px;
            font-weight: bold;
        }

        .slogan { 
            font-size: 14px;
            color: #ffffff;
            margin-top: 3px;
            text-align: right; /* Aligns text to the right */
            align-self: flex-start; 
            width: 100%; /* Ensures it stays below the logo */
            margin-left: 16px; /* Increase this value to move it more right */
        }
        
        .content {
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="logo-container">
            <a href="/main" class="logo">
                <img src="/static/removed-background.png" alt="Logo">
                <div class="logo-text">Flot Dreamz</div>
            </a>
            <div class="slogan">Find. Invest. Live Your Dream.</div>
        </div>
    </header>

    <!-- Home Content -->
    <div class="content">
        <h1>Welcome to Flot Dreamz</h1>
        <p>Find your dream property with us!</p>
    </div>

</body>
</html>
