<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            width: 70%;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
        }
        p {
            color: #555;
            font-size: 1.1rem;
        }
        .btn {
            background-color: #ff5722;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #e64a19;
        }
        img {
            margin-top: 20px;
            width: 100%;
            max-height: 300px;
            border-radius: 8px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Explore Properties</h2>
        <p>Find your dream home or invest in top properties from our exclusive listings.</p>
        <a class="btn" href="/buy">Browse Properties</a>
        <img src="https://via.placeholder.com/800x300?text=Properties" alt="Properties">
    </div>
</body>
</html>
