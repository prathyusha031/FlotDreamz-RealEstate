{% extends 'base.html' %}
{% block content %}
<h1>Available Properties</h1>
<form method="get">
    <input type="text" name="q" placeholder="Search by title or location">
    <button type="submit">Search</button>
</form>
<div>
    {% for property in properties %}
    <div>
        <img src="{{ property.image.url }}" width="200">
        <h2>{{ property.title }}</h2>
        <p>{{ property.location }} - ₹{{ property.price }}</p>
        <a href="{% url 'property_detail' property.id %}">View Details</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
