{% extends "home.html" %}
{% load static %}

{% block content %}

<style>
    .signup-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8f9fa;
        padding: 2rem 1rem;
    }

    .signup-card {
        width: 100%;
        max-width: 500px;
        background: #fff;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .signup-card h2 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 600;
    }

    .form-label span {
        color: red;
    }

    .btn-signup {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
    }
</style>

<div class="signup-wrapper">
    <div class="signup-card">

```
    <h2>Create Your Account</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'signup' %}">
        {% csrf_token %}

        <!-- Full Name -->
        <div class="mb-3">
            <label class="form-label">
                Full Name <span>*</span>
            </label>
            <input
                type="text"
                name="full_name"
                class="form-control"
                placeholder="Enter your full name"
                required
            >
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">
                Email <span>*</span>
            </label>
            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required
            >
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">
                Password <span>*</span>
            </label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter password"
                required
            >
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
            <label class="form-label">
                Confirm Password <span>*</span>
            </label>
            <input
                type="password"
                name="confirm_password"
                class="form-control"
                placeholder="Confirm password"
                required
            >
        </div>

        <!-- Terms -->
        <div class="form-check mb-3">
            <input
                class="form-check-input"
                type="checkbox"
                required
            >
            <label class="form-check-label">
                I agree to the
                <a href="{% url 'terms_conditions' %}">
                    Terms and Conditions
                </a>
            </label>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary btn-signup">
            Sign Up
        </button>

    </form>

    <div class="text-center mt-3">
        Already have an account?
        <a href="{% url 'login' %}">
            Login here
        </a>
    </div>

</div>

</div>

{% endblock %}
